version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: majisa_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: majisa_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/majisa_garage
      - JWT_SECRET=majisa_secret_key_123
    depends_on:
      - mongodb

  nginx_proxy:
    build: ./frontend
    container_name: majisa_frontend_proxy
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data: